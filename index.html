/* ════════════════ DESIGN TOKENS — change colors / fonts here ════════════════ */
:root{
  --paper:#F2F1EC; --ink:#16161A; --muted:#6E6C66; --line:#DCDAD2; --card:#FBFAF6;
  --accent:#2540D9; --accent-soft:rgba(37,64,217,.08); --grid:rgba(22,22,26,.045);
  --font-display:'Space Grotesk',sans-serif; --font-body:'Inter',sans-serif; --font-mono:'JetBrains Mono',monospace;
  --maxw:1140px; --pad:clamp(20px,5vw,64px);
}
html[data-theme="dark"]{
  --paper:#121316; --ink:#ECEAE3; --muted:#9A988F; --line:#2A2B30; --card:#181A1E;
  --accent:#7E92FF; --accent-soft:rgba(126,146,255,.12); --grid:rgba(236,234,227,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;overflow-x:hidden}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}
.wrap{max-width:var(--maxw);margin:0 auto;padding-left:var(--pad);padding-right:var(--pad)}
.eyebrow{font-family:var(--font-mono);font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);display:inline-flex;align-items:center;gap:8px}
.eyebrow::before{content:"";width:22px;height:1px;background:var(--accent)}

/* NAV */
nav{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--paper) 85%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.brand{font-family:var(--font-display);font-weight:700;font-size:18px;letter-spacing:-.01em}
.brand span{color:var(--accent)}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{font-family:var(--font-mono);font-size:13px;color:var(--muted);transition:color .2s}
.nav-links a:hover{color:var(--ink)}
.theme-btn{background:none;border:1px solid var(--line);color:var(--ink);width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:15px;display:grid;place-items:center;transition:border-color .2s,transform .2s}
.theme-btn:hover{border-color:var(--accent);transform:rotate(15deg)}

/* HERO */
.hero{position:relative;padding:clamp(70px,12vh,140px) 0 clamp(60px,10vh,110px);background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:46px 46px}
.status{display:inline-flex;align-items:center;gap:9px;font-family:var(--font-mono);font-size:13px;color:var(--muted);border:1px solid var(--line);background:var(--card);padding:7px 14px;border-radius:99px;margin-bottom:34px}
.dot{width:8px;height:8px;border-radius:50%;background:#27c46b;box-shadow:0 0 0 0 rgba(39,196,107,.5);animation:pulse 2.2s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 7px rgba(39,196,107,0)}100%{box-shadow:0 0 0 0 rgba(39,196,107,0)}}
.hero h1{font-family:var(--font-display);font-weight:700;font-size:clamp(48px,9vw,108px);line-height:.96;letter-spacing:-.03em;margin-bottom:26px}
.hero h1 .accent{color:var(--accent)}
.hero-sub{font-size:clamp(18px,2.5vw,23px);color:var(--muted);max-width:600px;margin-bottom:40px}
.hero-sub strong{color:var(--ink);font-weight:600}
.cta-row{display:flex;gap:14px;flex-wrap:wrap}
.btn{font-family:var(--font-mono);font-size:14px;padding:14px 26px;border-radius:8px;cursor:pointer;transition:transform .18s,background .2s,border-color .2s;display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff;border:1px solid var(--accent)}
.btn-primary:hover{transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn-ghost:hover{border-color:var(--accent);transform:translateY(-2px)}

/* SECTIONS */
.section{padding:clamp(64px,11vh,120px) 0;border-top:1px solid var(--line)}
.section-head{margin-bottom:52px}
.section-head h2{font-family:var(--font-display);font-weight:500;font-size:clamp(30px,5vw,48px);letter-spacing:-.02em;margin-top:16px}

/* ABOUT */
.about-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:clamp(36px,6vw,72px);align-items:start}
.about-text p{margin-bottom:20px;color:var(--ink)}
.about-text p.lead{font-size:21px;line-height:1.5}
.about-text .quote{font-family:var(--font-display);font-weight:500;font-size:22px;line-height:1.45;color:var(--accent);border-left:3px solid var(--accent);padding-left:18px;margin:8px 0 0}
.about-side{position:sticky;top:90px}
.portrait{width:100%;border-radius:14px;border:1px solid var(--line);margin-bottom:22px;filter:grayscale(.15)}
.facts{font-family:var(--font-mono);font-size:14px}
.fact{display:flex;justify-content:space-between;gap:16px;padding:13px 0;border-bottom:1px solid var(--line)}
.fact span:first-child{color:var(--muted)}
.fact span:last-child{text-align:right}

/* SKILLS */
.skill-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:30px}
.skill-group h3{font-family:var(--font-mono);font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:16px}
.tags{display:flex;flex-wrap:wrap;gap:9px}
.tag{font-family:var(--font-mono);font-size:13px;padding:7px 13px;border:1px solid var(--line);border-radius:7px;background:var(--card);transition:border-color .2s,color .2s}
.tag:hover{border-color:var(--accent);color:var(--accent)}
.lang-list{display:flex;flex-direction:column;gap:11px}
.lang-row{display:flex;justify-content:space-between;gap:14px;font-family:var(--font-mono);font-size:14px;padding-bottom:11px;border-bottom:1px solid var(--line)}
.lang-row span:last-child{color:var(--muted)}

/* PROJECTS (signature index) */
.project{display:grid;grid-template-columns:64px 1fr auto;align-items:center;gap:24px;padding:30px 14px;border-top:1px solid var(--line);transition:background .25s,padding-left .25s}
.project:last-child{border-bottom:1px solid var(--line)}
.project:hover{background:var(--accent-soft);padding-left:26px}
.project .num{font-family:var(--font-mono);font-size:14px;color:var(--muted)}
.project:hover .num{color:var(--accent)}
.project .body h3{font-family:var(--font-display);font-weight:500;font-size:clamp(20px,3vw,28px);letter-spacing:-.02em}
.project .body .meta{color:var(--muted);font-size:15px;margin-top:4px}
.project .ptags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.project .ptags span{font-family:var(--font-mono);font-size:12px;color:var(--muted);border:1px solid var(--line);padding:4px 9px;border-radius:5px}
.project .yr{font-family:var(--font-mono);font-size:13px;color:var(--muted)}

/* RESEARCH list */
.research{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.rcell{background:var(--paper);padding:24px}
.rcell h3{font-family:var(--font-display);font-weight:500;font-size:18px;line-height:1.35;margin-bottom:10px}
.rcell .rmeta{font-family:var(--font-mono);font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:12px}
.rcell .rmeta .inst{color:var(--accent)}

/* PUBLICATIONS */
.pub{display:flex;gap:20px;align-items:baseline;padding:22px 10px;border-top:1px solid var(--line);transition:background .2s,padding-left .2s}
.pub:last-child{border-bottom:1px solid var(--line)}
.pub:hover{background:var(--accent-soft);padding-left:18px}
.pub .pnum{font-family:var(--font-mono);font-size:13px;color:var(--muted);min-width:28px}
.pub .ptitle{font-size:16px;line-height:1.45}
.pub a.ptitle:hover{color:var(--accent)}
.pub .ext{font-family:var(--font-mono);font-size:12px;color:var(--accent);white-space:nowrap}
.pub .ext.none{color:var(--muted)}

/* TIMELINE (career + education) */
.timeline{border-left:2px solid var(--line);margin-left:6px}
.tl-item{position:relative;padding:0 0 38px 32px}
.tl-item:last-child{padding-bottom:0}
.tl-item::before{content:"";position:absolute;left:-7px;top:6px;width:12px;height:12px;border-radius:50%;background:var(--paper);border:2px solid var(--accent)}
.tl-date{font-family:var(--font-mono);font-size:13px;color:var(--accent);margin-bottom:6px}
.tl-item h3{font-family:var(--font-display);font-weight:500;font-size:21px}
.tl-item .role{color:var(--muted);font-size:15px;margin:2px 0 8px}
.tl-item p{color:var(--ink);font-size:15px}
.tl-item .ptags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.tl-item .ptags span{font-family:var(--font-mono);font-size:12px;color:var(--muted);border:1px solid var(--line);padding:4px 9px;border-radius:5px}

/* CONTACT */
.contact{text-align:center}
.contact h2{font-family:var(--font-display);font-weight:700;font-size:clamp(34px,7vw,68px);letter-spacing:-.03em;line-height:1.04;margin:18px 0 28px}
.mails{display:flex;flex-direction:column;gap:8px;font-family:var(--font-mono);font-size:15px;margin-bottom:8px}
.mails a{color:var(--accent);border-bottom:1px solid transparent;transition:border-color .2s;display:inline-block}
.mails a:hover{border-color:var(--accent)}
.socials{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:32px}
.socials a{font-family:var(--font-mono);font-size:14px;padding:11px 20px;border:1px solid var(--line);border-radius:8px;transition:border-color .2s,color .2s,transform .18s}
.socials a:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}

footer{border-top:1px solid var(--line);padding:34px 0;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-family:var(--font-mono);font-size:13px;color:var(--muted)}

.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s,transform .7s}
.reveal.in{opacity:1;transform:none}

@media(max-width:860px){.research{grid-template-columns:1fr}}
@media(max-width:760px){
  .nav-links a{display:none}
  .about-grid{grid-template-columns:1fr}
  .about-side{position:static}
  .portrait{max-width:260px}
  .project{grid-template-columns:40px 1fr;gap:16px}
  .project .yr{display:none}
  .pub{flex-wrap:wrap;gap:8px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}.reveal{opacity:1;transform:none}}

.lang-btn{background:none;border:1px solid var(--line);color:var(--ink);height:38px;padding:0 14px;border-radius:99px;cursor:pointer;font-family:var(--font-mono);font-size:13px;letter-spacing:.04em;transition:border-color .2s,color .2s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-actions{display:flex;align-items:center;gap:10px}
/* clickable affordance */
.clickable{cursor:pointer}
.rcell.clickable{transition:background .2s}
.rcell.clickable:hover{background:var(--accent-soft)}
.rcell .more{font-family:var(--font-mono);font-size:11px;color:var(--accent);margin-top:10px;opacity:0;transition:opacity .2s}
.rcell.clickable:hover .more{opacity:1}
.pub.clickable:hover .ptitle{color:var(--accent)}
/* modal */
.modal{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:center;padding:40px 18px;overflow-y:auto;background:rgba(8,8,11,.55);backdrop-filter:blur(5px)}
.modal.open{display:flex}
.modal-panel{background:var(--paper);border:1px solid var(--line);border-radius:16px;max-width:820px;width:100%;padding:clamp(24px,4vw,46px);position:relative;box-shadow:0 30px 90px rgba(0,0,0,.35);animation:pop .25s ease}
@keyframes pop{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.modal-close{position:absolute;top:16px;right:16px;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);color:var(--ink);cursor:pointer;font-size:15px;display:grid;place-items:center;transition:border-color .2s,transform .25s}
.modal-close:hover{border-color:var(--accent);transform:rotate(90deg)}
.modal .m-eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--accent)}
.modal h3{font-family:var(--font-display);font-weight:500;font-size:clamp(22px,3.4vw,30px);letter-spacing:-.02em;margin:10px 40px 6px 0;line-height:1.25}
.modal .m-meta{font-family:var(--font-mono);font-size:13px;color:var(--muted);margin-bottom:18px}
.modal .m-body{font-size:16px;line-height:1.65;margin-bottom:20px}
.modal .ptags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.modal .ptags span{font-family:var(--font-mono);font-size:12px;color:var(--muted);border:1px solid var(--line);padding:4px 9px;border-radius:5px}
.pdf-frame{width:100%;height:72vh;border:1px solid var(--line);border-radius:10px;background:#fff;margin-bottom:18px}
.m-actions{display:flex;gap:12px;flex-wrap:wrap}
.m-actions a{font-family:var(--font-mono);font-size:14px;padding:11px 20px;border:1px solid var(--line);border-radius:8px;transition:border-color .2s,color .2s,transform .18s}
.m-actions a:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
.m-note{font-family:var(--font-mono);font-size:12px;color:var(--muted);margin-top:14px;line-height:1.5}
</style>
</head>

     "pdf"에 PDF 경로(예: "papers/논문.pdf")를 넣으면 팝업에서 바로 열람됩니다.
   ───────────────────────────────────────────────────────────── */
let LANG = 'en';            // 처음 보일 언어: 'en' 또는 'ko'
let firstRender = true;
let currentDetail = null;

const t = o => (o && typeof o === 'object' && 'en' in o) ? (o[LANG] ?? o.en) : o;
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const tagSpans = arr => arr.map(x => `<span>${t(x)}</span>`).join('');
const head = (s) => `<div class="section-head reveal"><span class="eyebrow">${t(s.eyebrow)}</span><h2>${t(s.heading)}</h2></div>`;

function heroHTML(){
  const h = CONTENT.hero, m = CONTENT.meta;
  return `<header class="hero" id="top"><div class="wrap">
    <div class="status reveal"><span class="dot"></span> ${t(m.status)}</div>
    <h1 class="reveal">${t(h.greeting)}<br><span class="accent">${t(h.name)}</span>${t(h.suffix)}</h1>
    <p class="hero-sub reveal">${t(h.sub)}</p>
    <div class="cta-row reveal">
      <a href="#projects" class="btn btn-primary">${t(h.cta1)}</a>
      <a href="#contact" class="btn btn-ghost">${t(h.cta2)}</a>
    </div></div></header>`;
}
function aboutHTML(){
  const a = CONTENT.about;
  const facts = a.facts.map(f => `<div class="fact"><span>${t(f.label)}</span><span>${t(f.value)}</span></div>`).join('');
  return `<section class="section" id="about"><div class="wrap">${head(a)}
    <div class="about-grid">
      <div class="about-text reveal">
        <p class="lead">${t(a.lead)}</p>
        <p>${t(a.body)}</p>
        <p class="quote">${t(a.quote)}</p>
      </div>
      <div class="about-side reveal">
        <img class="portrait" src="${PHOTO}" onerror="this.onerror=null;this.src=PHOTO_FALLBACK;" alt="${t(a.photoAlt)}">
        <div class="facts">${facts}</div>
      </div>
    </div></div></section>`;
}
function skillsHTML(){
  const s = CONTENT.skills;
  const langs = s.languages.rows.map(r => `<div class="lang-row"><span>${t(r.name)}</span><span>${t(r.level)}</span></div>`).join('');
  return `<section class="section" id="skills"><div class="wrap">${head(s)}
    <div class="skill-cols">
      <div class="skill-group reveal"><h3>${t(s.programming.title)}</h3><div class="tags">${tagSpans(s.programming.tags)}</div></div>
      <div class="skill-group reveal"><h3>${t(s.ml.title)}</h3><div class="tags">${tagSpans(s.ml.tags)}</div></div>
      <div class="skill-group reveal"><h3>${t(s.languages.title)}</h3><div class="lang-list">${langs}</div></div>
    </div></div></section>`;
}
function careerHTML(){
  const c = CONTENT.career;
  const items = c.items.map(i => `<div class="tl-item reveal">
      <div class="tl-date">${t(i.date)}</div><h3>${t(i.org)}</h3>
      <div class="role">${t(i.role)}</div><p>${t(i.desc)}</p>
      <div class="ptags">${tagSpans(i.tags)}</div></div>`).join('');
  return `<section class="section" id="career"><div class="wrap">${head(c)}<div class="timeline">${items}</div></div></section>`;
}
function projectsHTML(){
  const p = CONTENT.projects;
  const items = p.items.map((i, n) => `<div class="project reveal clickable" onclick="openDetail('projects',${n})">
      <div class="num">${i.num}</div>
      <div class="body"><h3>${t(i.title)}</h3><div class="meta">${t(i.meta)}</div><div class="ptags">${tagSpans(i.tags)}</div></div>
      <div class="yr">${i.year}</div></div>`).join('');
  return `<section class="section" id="projects"><div class="wrap">${head(p)}${items}</div></section>`;
}
function researchHTML(){
  const r = CONTENT.research;
  const more = LANG === 'en' ? 'View details →' : '자세히 →';
  const cells = r.items.map((i, n) => `<div class="rcell clickable" onclick="openDetail('research',${n})">
      <h3>${t(i.title)}</h3>
      <div class="rmeta"><span class="inst">${t(i.inst)}</span><span>${i.year}</span></div>
      <div class="more">${more}</div></div>`).join('');
  return `<section class="section" id="research"><div class="wrap">${head(r)}<div class="research reveal">${cells}</div></div></section>`;
}
function pubsHTML(){
  const p = CONTENT.publications;
  const items = p.items.map((i, n) => {
    const num = String(n+1).padStart(2,'0');
    const hasLink = i.href || i.pdf;
    const ext = `<span class="ext${hasLink?'':' none'}">${i.label}</span>`;
    return `<div class="pub reveal clickable" onclick="openDetail('publications',${n})">
      <span class="pnum">${num}</span><span class="ptitle">${esc(i.title)}</span>${ext}</div>`;
  }).join('');
  return `<section class="section" id="publications"><div class="wrap">${head(p)}${items}</div></section>`;
}
function educationHTML(){
  const e = CONTENT.education;
  const items = e.items.map(i => {
    const note = t(i.note) ? `<p>${t(i.note)}</p>` : '';
    return `<div class="tl-item reveal"><div class="tl-date">${t(i.date)}</div>
      <h3>${t(i.school)}</h3><div class="role">${t(i.role)}</div>${note}</div>`;
  }).join('');
  return `<section class="section" id="education"><div class="wrap">${head(e)}<div class="timeline">${items}</div></div></section>`;
}
function contactHTML(){
  const c = CONTENT.contact;
  const mails = c.emails.map(m => `<a href="mailto:${m}">${m}</a>`).join('');
  const links = c.links.map(l => `<a href="${l.href}" target="_blank" rel="noopener">${l.label}</a>`).join('');
  return `<section class="section" id="contact"><div class="wrap contact">
    <span class="eyebrow reveal" style="justify-content:center">${t(c.eyebrow)}</span>
    <h2 class="reveal">${t(c.heading)}</h2>
    <div class="mails reveal">${mails}</div>
    <div class="socials reveal">${links}</div></div></section>`;
}
function footerHTML(){
  const f = CONTENT.footer;
  return `<footer class="wrap"><span>${t(f.left)}</span><span>${t(f.right)}</span></footer>`;
}

/* ── detail modal ── */
function openDetail(type, idx){ currentDetail = {type, idx}; renderModal(); document.getElementById('modal').classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeDetail(){ currentDetail = null; document.getElementById('modal').classList.remove('open'); document.body.style.overflow = ''; }
function renderModal(){
  if(!currentDetail) return;
  const {type, idx} = currentDetail;
  const item = CONTENT[type].items[idx];
  const eyebrow = LANG === 'en' ? {projects:'Project', research:'Research', publications:'Paper'}[type]
                                : {projects:'프로젝트', research:'연구', publications:'논문'}[type];
  const title = (type === 'publications') ? esc(item.title) : t(item.title);
  let metaParts = [];
  if(type === 'projects'){ metaParts = [t(item.meta), item.year]; }
  if(type === 'research'){ metaParts = [t(item.inst), item.year]; }
  if(type === 'publications'){ metaParts = [item.label]; }
  const meta = metaParts.filter(Boolean).join(' · ');
  const tags = item.tags ? `<div class="ptags">${tagSpans(item.tags)}</div>` : '';
  const detailText = item.detail ? t(item.detail) : (item.abstract ? t(item.abstract) : '');
  const body = detailText ? `<div class="m-body">${detailText}</div>` : '';
  const pdf = item.pdf ? `<iframe class="pdf-frame" src="${item.pdf}" title="PDF"></iframe>` : '';
  const actions = [];
  if(item.pdf) actions.push(`<a href="${item.pdf}" target="_blank" rel="noopener">${LANG==='en'?'Open PDF ↗':'PDF 새 창에서 열기 ↗'}</a>`);
  if(item.href) actions.push(`<a href="${item.href}" target="_blank" rel="noopener">${LANG==='en'?'Open link ↗':'링크 열기 ↗'}</a>`);
  if(item.links) item.links.forEach(l => actions.push(`<a href="${l.href}" target="_blank" rel="noopener">${t(l.label)} ↗</a>`));
  const actionsHtml = actions.length ? `<div class="m-actions">${actions.join('')}</div>` : '';
  let note = '';
  if(!item.pdf && !item.href && !item.links?.length){
    note = `<div class="m-note">${LANG==='en'
      ? 'No file attached yet. Add a PDF path (e.g. "papers/paper.pdf") to the "pdf" field in CONTENT to view it here.'
      : '아직 첨부 파일이 없습니다. CONTENT의 "pdf" 항목에 경로(예: "papers/논문.pdf")를 넣으면 여기서 바로 볼 수 있어요.'}</div>`;
  }
  document.getElementById('modalPanel').innerHTML = `
    <button class="modal-close" onclick="closeDetail()" aria-label="Close">✕</button>
    <div class="m-eyebrow">${eyebrow}</div>
    <h3>${title}</h3>
    <div class="m-meta">${meta}</div>
    ${tags}${body}${pdf}${actionsHtml}${note}`;
}

function render(){
  document.documentElement.lang = LANG;
  document.title = t(CONTENT.meta.title);
  document.getElementById('brand').innerHTML = `${t(CONTENT.meta.name)}<span>.</span>`;
  document.getElementById('navLinks').innerHTML = CONTENT.nav.map(n => `<a href="#${n.id}">${t(n.label)}</a>`).join('');
  document.getElementById('langToggle').textContent = LANG === 'en' ? 'KO' : 'EN';
  document.getElementById('app').innerHTML =
    heroHTML()+aboutHTML()+skillsHTML()+careerHTML()+projectsHTML()+researchHTML()+pubsHTML()+educationHTML()+contactHTML()+footerHTML();
  initReveal(firstRender);
  firstRender = false;
  if(currentDetail) renderModal();
}
function initReveal(animate){
  const els = document.querySelectorAll('.reveal');
  if(!animate || !('IntersectionObserver' in window)){ els.forEach(e => e.classList.add('in')); return; }
  const io = new IntersectionObserver((es) => { es.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } }); }, {threshold:.12});
  els.forEach(e => io.observe(e));
}

/* theme */
(function(){
  const root = document.documentElement;
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  root.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  document.getElementById('themeToggle').addEventListener('click', () => {
    root.setAttribute('data-theme', root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
  });
})();
/* language toggle */
document.getElementById('langToggle').addEventListener('click', () => { LANG = LANG === 'en' ? 'ko' : 'en'; render(); });
/* modal close interactions */
document.getElementById('modal').addEventListener('click', e => { if(e.target.id === 'modal') closeDetail(); });
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDetail(); });

render();

</script>
</body>
</html>
